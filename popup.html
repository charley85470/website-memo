<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Memo</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="container">
    <h1>網站工具箱</h1>

    <div class="mode-switch" role="tablist" aria-label="模式切換">
      <button id="modeMemo" class="active" type="button">Memo</button>
      <button id="modeBorder" type="button">Border</button>
    </div>

    <section class="card">
      <div class="section-title">作用域</div>
      <label><input type="radio" name="scopeType" value="domain" checked /> domain 下所有頁面</label>
      <label><input type="radio" name="scopeType" value="parent" /> 同父目錄所有頁面</label>
      <input id="parentScopeInput" type="text" />
      <label><input type="radio" name="scopeType" value="page" /> 僅該頁面</label>
      <div id="scopePreview" class="hint"></div>
    </section>

    <section id="memoPanel" class="card">
      <div class="section-title">Memo 設定</div>
      <label>內容</label>
      <textarea id="memoText" rows="4" placeholder="輸入 memo 內容"></textarea>
      <label>顏色</label>
      <input id="memoColor" type="color" value="#fff4a3" />
      <button id="addMemo" type="button">新增 Memo</button>
    </section>

    <section id="borderPanel" class="card hidden">
      <div class="section-title">Border 設定</div>
      <label>邊框顏色</label>
      <input id="borderColor" type="color" value="#ef4444" />
      <label>上方文字</label>
      <input id="labelTop" type="text" placeholder="上方說明（可空白）" />
      <label>右方文字</label>
      <input id="labelRight" type="text" placeholder="右方說明（可空白）" />
      <label>下方文字</label>
      <input id="labelBottom" type="text" placeholder="下方說明（可空白）" />
      <label>左方文字</label>
      <input id="labelLeft" type="text" placeholder="左方說明（可空白）" />
      <button id="addBorder" type="button">新增 Border</button>
    </section>

    <button id="openOptions" class="secondary" type="button">開啟完整設定視窗</button>
    <div id="status" class="status"></div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
